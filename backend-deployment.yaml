apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: hashicorp/http-echo
        args:
        - "-text=Hi from Backend Pod"
        ports:
        - containerPort: 5678
