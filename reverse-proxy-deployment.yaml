apiVersion: apps/v1
kind: Deployment
metadata:
  name: reverse-proxy
  labels:
    app: reverse-proxy

spec:
  replicas: 2

  selector:
    matchLabels:
      app: reverse-proxy

  template:
    metadata:
      labels:
        app: reverse-proxy

    spec:
      containers:
- name: nginx
  image: nginx:latest

  env:
  - name: PROXY_POD_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.name

  ports:
  - containerPort: 80

  volumeMounts:
  - name: nginx-config
    mountPath: /etc/nginx/nginx.conf
    subPath: nginx.conf
