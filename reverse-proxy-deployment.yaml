apiVersion: apps/v1
kind: Deployment
metadata:
  name: reverse-proxy
  labels:
    app: reverse-proxy

spec:
  replicas: 2

  selector:
    matchLabels:
      app: reverse-proxy

  template:
    metadata:
      labels:
        app: reverse-proxy

    spec:
      containers:
      - name: nginx-reverse-proxy
        image: nginx:latest

        ports:
        - containerPort: 80

        volumeMounts:
        - name: nginx-config-volume
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf

      volumes:
      - name: nginx-config-volume
        configMap:
          name: nginx-config
